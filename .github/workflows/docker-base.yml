name: Docker base image

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - pyproject.toml
      - .github/workflows/docker-base.yml
  pull_request:
    branches: [main]
    paths:
      - Dockerfile
      - pyproject.toml
      - .github/workflows/docker-base.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/ai-fea-engine
  TAG: p1-base

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push on main)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE }}:${{ env.TAG }}
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Probe toolchain inside freshly built image
        if: github.event_name != 'push' || github.ref != 'refs/heads/main'
        run: |
          docker buildx build --load -t ai-fea-engine:ci-probe .
          docker run --rm -e AI_FEA_IN_CONTAINER=1 ai-fea-engine:ci-probe \
            pytest tests/test_toolchain_probes.py -v --tb=short
