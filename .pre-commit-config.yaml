repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Pinned to match what CI's ``pip install -e ".[dev]"`` resolves
    # for ``ruff>=0.8`` (currently 0.15.x). Older 0.8.6 pin formatted
    # differently from 0.15.x and the ``ruff format --check .`` step
    # in CI would catch the divergence on every PR until both sides
    # agreed.
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: hf1-path-guard
        name: HF1 forbidden-zone path guard (ADR-011 §HF1)
        description: Reject staged diffs that touch the HF1 forbidden zone unless HF1_GUARD_OVERRIDE='<reason>' is set. The script reads `git diff --cached --name-status -z` itself, covering renames (both sides) and deletes that pre-commit's filter would otherwise hide.
        entry: python3 scripts/hf1_path_guard.py
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
      - id: hf5-commit-trailer-check
        name: HF5 commit trailer check
        description: Validate Execution-by, Self-verified, and Linear-issue trailers in commit messages.
        entry: python3 scripts/hf5_commit_trailer_check.py --message-file
        language: system
        stages: [commit-msg]
