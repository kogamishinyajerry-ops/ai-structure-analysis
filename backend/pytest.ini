[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --cov=app --cov-report=html --cov-report=term-missing
markers =
    legacy: tests covering frozen Sprint-N modules under app._frozen/* (RFC-001 §6.1 Bucket B). Excluded from MVP coverage gates.
